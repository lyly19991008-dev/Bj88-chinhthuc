<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJ88 - Giao Diện Chuẩn</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* HEADER */
        .header { background: #111; padding: 10px 5% ; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff9800; }
        .logo img { height: 40px; object-fit: contain; }
        .auth-buttons button { padding: 8px 15px; margin-left: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-login { background: #ff9800; color: white; }
        .btn-register { background: #444; color: white; }

        /* BANNER TRÀN VIỀN - CHIỀU CAO THẤP */
.banner-container { 
    width: 100%; 
    max-width: 100%; /* Đảm bảo tràn hết màn hình, không còn khoảng trống */
    overflow: hidden; 
    position: relative; 
    background: #000;
    /* Tỷ lệ 16/4 giúp banner dẹt lại, nhìn sẽ nhỏ gọn và chuyên nghiệp hơn */
    aspect-ratio: 16 / 4; 
}

.banner-slide { 
    display: flex; 
    width: 600%; 
    height: 100%; 
    animation: slide-animation 18s infinite; 
}

.banner-slide img { 
    width: 16.666%; 
    height: 100%; 
    object-fit: cover; /* Giúp ảnh lấp đầy khung hình mà không bị méo */
    display: block; 
}
        
        @keyframes slide-animation {
            0%, 14% { transform: translateX(0); }
            16%, 30% { transform: translateX(-16.666%); }
            32%, 46% { transform: translateX(-33.332%); }
            48%, 62% { transform: translateX(-49.998%); }
            64%, 78% { transform: translateX(-66.664%); }
            80%, 94% { transform: translateX(-83.33%); }
            100% { transform: translateX(0); }
        }

        /* MENU ICON - Trải dài ngang để lấp khoảng trống */
        .game-menu { 
            display: flex; 
            background: #222; 
            padding: 10px 5%; 
            justify-content: space-between; /* Trải đều ra hai bên */
            border-bottom: 1px solid #333;
            flex-wrap: nowrap;
            overflow-x: auto; /* Vẫn cho phép vuốt trên mobile */
        }
        .menu-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex: 1; /* Mỗi item chiếm không gian bằng nhau để lấp đầy hàng */
            min-width: 60px;
            font-size: 10px; 
            cursor: pointer; 
            color: #bbb; 
            text-transform: uppercase;
        }
        .menu-item img { width: 24px; height: 24px; margin-bottom: 5px; }
        .menu-item.active { color: #ff9800; font-weight: bold; }

        /* MỤC ĐỀ XUẤT - Sửa lỗi vỡ ảnh */
        .recommend-section { padding: 15px 5%; background-color: #1a1a1a; }
        .recommend-title { font-size: 16px; font-weight: bold; color: white; margin-bottom: 12px; border-left: 4px solid #ff9800; padding-left: 10px; }
        .recommend-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* Chia 3 cột bằng nhau */
            gap: 15px; 
        }
        .recommend-item { 
            width: 100%;
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            background: #333; /* Nền tối để nếu ảnh chưa load không bị trắng xóa */
        }
        .recommend-item img { 
            width: 100%; 
            height: auto; 
            display: block; 
            object-fit: contain; /* Giữ nguyên tỷ lệ ảnh không bị bóp méo */
        }

        /* Responsive cho Mobile */
        @media (max-width: 768px) {
            .recommend-container { grid-template-columns: 1fr; } /* Mobile hiện 1 ảnh mỗi hàng */
            .game-menu { justify-content: flex-start; gap: 20px; }
        }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }
        .modal-content { background: white; width: 320px; margin: 80px auto; padding: 25px; border-radius: 12px; text-align: center; color: #333; }
        .btn-submit { width: 100%; padding: 12px; background: #ff9800; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
